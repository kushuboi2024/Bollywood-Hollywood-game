<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bollywood / Hollywood</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#050505;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 12px 48px;}
#app{width:100%;max-width:480px;}
#gr{font-family:'DM Sans',sans-serif;min-height:540px;background:#0a0a0a;color:#f5f0e8;padding:24px 18px 28px;border-radius:12px;border:0.5px solid #1e1e1e;}
.hdr{text-align:center;margin-bottom:6px;}
.hdr h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(90deg,#f5c842,#f5f0e8,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr .sub{font-size:11px;color:#555;letter-spacing:4px;text-transform:uppercase;margin-top:3px;}
.film{display:flex;justify-content:center;gap:5px;margin-bottom:14px;}
.spr{width:9px;height:9px;border:1.5px solid #1e1e1e;border-radius:2px;}
.mode-tabs{display:flex;margin-bottom:18px;border:0.5px solid #222;border-radius:8px;overflow:hidden;}
.mode-tab{flex:1;padding:10px 6px;text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#555;cursor:pointer;background:transparent;border:none;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;border-right:0.5px solid #222;}
.mode-tab:last-child{border-right:none;}
.mode-tab.active{background:#f5c842;color:#0a0a0a;}
.mode-tab:hover:not(.active){background:#161616;color:#aaa;}
.card{background:#111;border:0.5px solid #222;border-radius:8px;padding:16px;}
.card+.card{margin-top:10px;}
.label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:6px;}
input.fi{width:100%;padding:9px 14px;background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:6px;color:#f5f0e8;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:10px;}
input.fi:focus{border-color:#f5c842;}
input.fi.err{border-color:#a32d2d;}
.btn{padding:9px 22px;border-radius:6px;border:0.5px solid #f5c842;background:transparent;color:#f5c842;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s;margin:3px;}
.btn:hover{background:#f5c842;color:#0a0a0a;}
.btn.sec{border-color:#333;color:#666;}
.btn.sec:hover{background:#1e1e1e;color:#f5f0e8;}
.btn.sm{padding:6px 14px;font-size:11px;}
.cat-row{display:flex;gap:8px;margin-bottom:10px;}
.cat{flex:1;padding:8px;border-radius:6px;border:0.5px solid #2a2a2a;background:transparent;color:#555;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center;}
.cat.active{border-color:#f5c842;color:#f5c842;background:rgba(245,200,66,.08);}
.cat.shake{border-color:#a32d2d !important;animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.movie-disp{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 16px;min-height:52px;align-items:flex-end;padding:10px 12px;background:#0d0d0d;border:0.5px solid #1e1e1e;border-radius:8px;margin-bottom:14px;}
.word-group{display:flex;flex-direction:row;align-items:flex-end;gap:4px;white-space:nowrap;flex-shrink:0;}
.cbox{display:flex;flex-direction:column;align-items:center;gap:3px;}
.cl{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;min-width:18px;text-align:center;color:#f5c842;}
.cl.h{color:transparent;}
.cu{width:18px;height:1.5px;background:#333;}
.csp{width:9px;}
.hrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:8px 12px;background:#0d0d0d;border:0.5px solid #1e1e1e;border-radius:8px;}
.ldots{display:flex;gap:4px;}
.ld{width:9px;height:9px;border-radius:50%;background:#f5c842;transition:background .3s;}
.ld.x{background:#222;}
.catbadge{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:4px;border:0.5px solid #f5c842;color:#f5c842;}
.kb{display:flex;flex-direction:column;gap:5px;align-items:center;margin-bottom:12px;}
.kbr{display:flex;gap:4px;}
.k{width:30px;height:32px;border-radius:4px;border:0.5px solid #2a2a2a;background:#141414;color:#aaa;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .1s;text-transform:uppercase;}
.k:hover:not(:disabled){background:#222;color:#fff;transform:translateY(-1px);}
.k:disabled{opacity:.3;cursor:not-allowed;}
.k.hit{background:#0d1a06;border-color:#3b6d11;color:#7fc43a;}
.k.miss{background:#1a0606;border-color:#a32d2d;color:#a32d2d;}
.k.num{width:26px;font-size:11px;}
.nlabel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#333;text-align:center;margin-bottom:3px;}
.pills{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:12px;min-height:26px;}
.pill{font-size:12px;padding:2px 9px;border-radius:20px;border:0.5px solid #2a2a2a;color:#555;font-weight:500;}
.pill.ok{border-color:#3b6d11;color:#7fc43a;background:#0a130a;}
.pill.no{border-color:#a32d2d;color:#a32d2d;background:#130a0a;}
.scoreboard{display:flex;gap:10px;margin-bottom:14px;}
.scrd{flex:1;background:#0d0d0d;border:0.5px solid #1e1e1e;border-radius:8px;padding:10px 12px;text-align:center;}
.scrd .sn{font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.scrd .sv{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#f5c842;}
.scrd .role-tag{font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.scrd.guesser{border-color:#f5c842;}
.ovl{text-align:center;padding:20px 14px;border-radius:8px;border:0.5px solid #222;background:#111;}
.ovl h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;margin-bottom:6px;}
.ovl h2.win{color:#f5c842;}
.ovl h2.lose{color:#a32d2d;}
.ovl .mn{font-family:'Playfair Display',serif;font-size:16px;color:#f5f0e8;margin-bottom:4px;}
.ovl .sub2{font-size:12px;color:#555;margin-bottom:16px;}
.room-code{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;letter-spacing:8px;color:#f5c842;text-align:center;padding:14px;background:#0d0d0d;border-radius:8px;border:0.5px solid #222;margin:10px 0;cursor:pointer;transition:border-color .2s;}
.room-code:hover{border-color:#f5c842;}
.info{font-size:12px;color:#555;text-align:center;line-height:1.7;margin-bottom:10px;}
.pulse{animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tag{display:inline-block;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:4px;border:0.5px solid #2a2a2a;color:#555;margin-bottom:10px;}
.msg{font-size:12px;color:#777;text-align:center;min-height:16px;margin:6px 0;}
.msg.err{color:#a32d2d;}
.msg.ok{color:#7fc43a;}
.turn-banner{text-align:center;padding:8px;background:rgba(245,200,66,.05);border:0.5px solid rgba(245,200,66,.12);border-radius:6px;margin-bottom:12px;font-size:12px;color:#f5c842;letter-spacing:1px;}
.winner-text{font-family:'Playfair Display',serif;font-size:20px;color:#f5c842;margin-bottom:16px;}
.copy-tip{font-size:10px;color:#444;text-align:center;margin-top:4px;letter-spacing:1px;}
/* single player */
.streak-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#0d0d0d;border:0.5px solid #1e1e1e;border-radius:8px;margin-bottom:12px;}
.streak-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#f5c842;}
.streak-label{font-size:10px;color:#444;letter-spacing:2px;text-transform:uppercase;}
.best-val{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#555;}
.sp-filter{display:flex;gap:6px;margin-bottom:8px;}
.sp-filter-btn{flex:1;padding:7px 4px;border-radius:6px;border:0.5px solid #2a2a2a;background:transparent;color:#555;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-align:center;transition:all .15s;}
.sp-filter-btn.active{border-color:#f5c842;color:#f5c842;background:rgba(245,200,66,.06);}
.diff-row{display:flex;gap:6px;margin-bottom:10px;}
.diff-btn{flex:1;padding:6px 4px;border-radius:6px;border:0.5px solid #2a2a2a;background:transparent;color:#555;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;text-align:center;transition:all .15s;}
.diff-btn.act-all{border-color:#f5c842;color:#f5c842;background:rgba(245,200,66,.06);}
.diff-btn.act-easy{border-color:#3b6d11;color:#7fc43a;background:rgba(59,109,17,.08);}
.diff-btn.act-medium{border-color:#f5c842;color:#f5c842;background:rgba(245,200,66,.06);}
.diff-btn.act-hard{border-color:#a32d2d;color:#e05555;background:rgba(163,45,45,.08);}
.movie-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:240px;overflow-y:auto;margin-bottom:10px;}
.movie-grid::-webkit-scrollbar{width:3px;}
.movie-grid::-webkit-scrollbar-track{background:#0d0d0d;}
.movie-grid::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
.movie-item{padding:8px 10px;background:#141414;border:0.5px solid #1e1e1e;border-radius:6px;cursor:pointer;transition:all .15s;}
.movie-item:hover{background:#1e1e1e;border-color:#444;}
.mi-title{font-size:12px;color:#aaa;font-weight:500;margin-bottom:3px;line-height:1.3;}
.mi-meta{display:flex;justify-content:space-between;align-items:center;}
.mi-year{font-size:10px;color:#444;}
.mi-cat{font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:3px;}
.mi-cat.bw{color:#7fc43a;border:0.5px solid #3b6d11;}
.mi-cat.hw{color:#5b9bd5;border:0.5px solid #185fa5;}
.mi-diff{font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.diff-easy{color:#7fc43a;}
.diff-medium{color:#f5c842;}
.diff-hard{color:#e05555;}
</style>
</head>
<body>
<div id="app">
  <div id="gr">
    <div class="hdr">
      <h1>Bollywood / Hollywood</h1>
      <div class="sub" id="mode-sub">The Movie Guessing Game</div>
    </div>
    <div class="film" id="film"></div>
    <div class="mode-tabs">
      <div class="mode-tab active" id="tab-sp" onclick="switchMode('sp')">Single Player</div>
      <div class="mode-tab" id="tab-mp" onclick="switchMode('mp')">2 Player</div>
    </div>
    <div id="area"></div>
  </div>
</div>
<script>
// ── Movie Database ────────────────────────────────────────────────
const MOVIES = {
  bollywood:[
    {t:'sholay',y:'1975',d:'easy'},{t:'dilwale dulhania le jayenge',y:'1995',d:'easy'},
    {t:'3 idiots',y:'2009',d:'easy'},{t:'dangal',y:'2016',d:'easy'},
    {t:'lagaan',y:'2001',d:'easy'},{t:'mughal e azam',y:'1960',d:'medium'},
    {t:'kabhi khushi kabhie gham',y:'2001',d:'medium'},{t:'dil chahta hai',y:'2001',d:'medium'},
    {t:'bajrangi bhaijaan',y:'2015',d:'medium'},{t:'queen',y:'2014',d:'easy'},
    {t:'zindagi na milegi dobara',y:'2011',d:'medium'},{t:'andhadhun',y:'2018',d:'medium'},
    {t:'article 15',y:'2019',d:'hard'},{t:'gangs of wasseypur',y:'2012',d:'hard'},
    {t:'dil dhadakne do',y:'2015',d:'medium'},{t:'taare zameen par',y:'2007',d:'medium'},
    {t:'pk',y:'2014',d:'easy'},{t:'barfi',y:'2012',d:'easy'},
    {t:'2 states',y:'2014',d:'easy'},{t:'rang de basanti',y:'2006',d:'medium'},
    {t:'devdas',y:'2002',d:'easy'},{t:'kahaani',y:'2012',d:'medium'},
    {t:'tumbbad',y:'2018',d:'hard'},{t:'stree',y:'2018',d:'easy'},
    {t:'uri the surgical strike',y:'2019',d:'medium'},{t:'super 30',y:'2019',d:'medium'},
    {t:'black friday',y:'2004',d:'hard'},{t:'highway',y:'2014',d:'easy'},
  ],
  hollywood:[
    {t:'the godfather',y:'1972',d:'easy'},{t:'forrest gump',y:'1994',d:'easy'},
    {t:'titanic',y:'1997',d:'easy'},{t:'the dark knight',y:'2008',d:'easy'},
    {t:'inception',y:'2010',d:'easy'},{t:'pulp fiction',y:'1994',d:'easy'},
    {t:'the matrix',y:'1999',d:'easy'},{t:'interstellar',y:'2014',d:'easy'},
    {t:'avengers endgame',y:'2019',d:'easy'},{t:'goodfellas',y:'1990',d:'medium'},
    {t:'schindlers list',y:'1993',d:'medium'},{t:'fight club',y:'1999',d:'easy'},
    {t:'the silence of the lambs',y:'1991',d:'medium'},{t:'gladiator',y:'2000',d:'easy'},
    {t:'the shawshank redemption',y:'1994',d:'medium'},{t:'parasite',y:'2019',d:'medium'},
    {t:'get out',y:'2017',d:'medium'},{t:'hereditary',y:'2018',d:'hard'},
    {t:'2001 a space odyssey',y:'1968',d:'hard'},{t:'apocalypse now',y:'1979',d:'hard'},
    {t:'blade runner 2049',y:'2017',d:'medium'},{t:'mad max fury road',y:'2015',d:'medium'},
    {t:'whiplash',y:'2014',d:'medium'},{t:'la la land',y:'2016',d:'easy'},
    {t:'1917',y:'2019',d:'hard'},{t:'12 angry men',y:'1957',d:'medium'},
    {t:'no country for old men',y:'2007',d:'hard'},{t:'memento',y:'2000',d:'hard'},
  ]
};

const VOWELS=new Set(['a','e','i','o','u']);
const KBROWS=['qwertyuiop','asdfghjkl','zxcvbnm'];
const DIGITS='0123456789'.split('');
const MAX_ROUNDS=3;
const POLL_MS=2500;

// ── Firebase config ───────────────────────────────────────────────
// Replace with your own Firebase project values.
// Get from: Firebase Console → Project Settings → Your apps → SDK setup
// Leave as-is to use localStorage fallback (same browser only).
const FIREBASE_DB_URL = "PASTE_YOUR_DATABASE_URL_HERE";
// e.g. "https://my-project-default-rtdb.firebaseio.com"
// ─────────────────────────────────────────────────────────────────

const _useFirebase = FIREBASE_DB_URL && !FIREBASE_DB_URL.startsWith("PASTE");

async function saveRoom(code, data) {
  if (_useFirebase) {
    try {
      const res = await fetch(`${FIREBASE_DB_URL}/rooms/${code}.json`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('Firebase write failed: ' + res.status);
    } catch(e) {
      console.warn('Firebase saveRoom error:', e);
      // fallback to localStorage so game still partially works
      localStorage.setItem('room_' + code, JSON.stringify(data));
    }
  } else {
    // localStorage fallback — works only in same browser, useful for testing
    localStorage.setItem('room_' + code, JSON.stringify(data));
  }
}

async function loadRoom(code) {
  if (_useFirebase) {
    try {
      const res = await fetch(`${FIREBASE_DB_URL}/rooms/${code}.json`);
      if (!res.ok) throw new Error('Firebase read failed: ' + res.status);
      const data = await res.json();
      // Firebase returns null (not 404) when key doesn't exist
      return data;
    } catch(e) {
      console.warn('Firebase loadRoom error:', e);
      // try localStorage as fallback
      const ls = localStorage.getItem('room_' + code);
      return ls ? JSON.parse(ls) : null;
    }
  } else {
    const ls = localStorage.getItem('room_' + code);
    return ls ? JSON.parse(ls) : null;
  }
}

function storageMode() {
  return _useFirebase ? 'firebase' : 'local';
}
function genCode(){return Math.random().toString(36).substr(2,5).toUpperCase();}

// ── Shared char renderer — groups by word so wrapping never splits a word ──
function buildChars(title, display) {
  const words = title.split(' ');
  let charIdx = 0;
  return words.map(word => {
    const letters = word.split('').map(c => {
      const i = charIdx++;
      const shown = display[i] !== '_';
      return `<div class="cbox"><div class="cl${shown ? '' : ' h'}">${shown ? c.toUpperCase() : 'A'}</div><div class="cu"></div></div>`;
    }).join('');
    charIdx++; // skip the space character in display array
    return `<div class="word-group">${letters}</div>`;
  }).join('');
}


let currentMode='sp';
let sp={phase:'setup',movie:null,display:[],guessed:new Set(),chances:9,won:false,filterCat:'all',filterDiff:'all',streak:0,bestStreak:parseInt(localStorage.getItem('bwhg_best')||'0')};
let local={role:null,code:null,name:'',pollTimer:null};
let room=null;
let _spList=[];

// ── Mode switch ───────────────────────────────────────────────────
window.switchMode=function(m){
  currentMode=m;
  document.getElementById('tab-sp').classList.toggle('active',m==='sp');
  document.getElementById('tab-mp').classList.toggle('active',m==='mp');
  document.getElementById('mode-sub').textContent=m==='sp'?'Single Player':'2-Player · Live Multiplayer';
  document.removeEventListener('keydown',onKeySP);
  document.removeEventListener('keydown',onKeyMP);
  if(m==='sp')renderSP(); else renderMP();
};

// ════════════════════════════════════════════════════════════════
// SINGLE PLAYER
// ════════════════════════════════════════════════════════════════
function renderSP(){
  document.removeEventListener('keydown',onKeySP);
  const a=document.getElementById('area');
  if(sp.phase==='setup'){a.innerHTML=buildSPSetup();return;}
  if(sp.phase==='playing'){buildSPPlaying();return;}
  if(sp.phase==='over'){a.innerHTML=buildSPOver();return;}
}

function titleCase(s){return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');}

function buildSPSetup(){
  _spList=[];
  const cats=sp.filterCat==='all'?['bollywood','hollywood']:[sp.filterCat];
  cats.forEach(c=>MOVIES[c].forEach(m=>_spList.push({...m,cat:c})));
  if(sp.filterDiff!=='all')_spList=_spList.filter(m=>m.d===sp.filterDiff);

  const items=_spList.map((m,i)=>`
    <div class="movie-item" onclick="spPick(${i})">
      <div class="mi-title">${titleCase(m.t)}</div>
      <div class="mi-meta">
        <span class="mi-year">${m.y}</span>
        <span class="mi-cat ${m.cat==='bollywood'?'bw':'hw'}">${m.cat==='bollywood'?'BW':'HW'}</span>
        <span class="mi-diff diff-${m.d}">${m.d}</span>
      </div>
    </div>`).join('');

  const da=sp.filterDiff;
  return`
    <div class="streak-bar">
      <div><div class="streak-label">Streak</div><div class="streak-val">${sp.streak}</div></div>
      <div style="flex:1"></div>
      <div style="text-align:right"><div class="streak-label">Best</div><div class="best-val">${sp.bestStreak}</div></div>
    </div>
    <div class="sp-filter">
      <div class="sp-filter-btn${sp.filterCat==='all'?' active':''}" onclick="spCat('all')">All</div>
      <div class="sp-filter-btn${sp.filterCat==='bollywood'?' active':''}" onclick="spCat('bollywood')">Bollywood</div>
      <div class="sp-filter-btn${sp.filterCat==='hollywood'?' active':''}" onclick="spCat('hollywood')">Hollywood</div>
    </div>
    <div class="diff-row">
      <div class="diff-btn${da==='all'?' act-all':''}" onclick="spDiff('all')">All</div>
      <div class="diff-btn${da==='easy'?' act-easy':''}" onclick="spDiff('easy')">Easy</div>
      <div class="diff-btn${da==='medium'?' act-medium':''}" onclick="spDiff('medium')">Medium</div>
      <div class="diff-btn${da==='hard'?' act-hard':''}" onclick="spDiff('hard')">Hard</div>
    </div>
    <div class="label" style="margin-bottom:8px;">${_spList.length} movies — pick one to guess</div>
    <div class="movie-grid">${_spList.length?items:'<div style="color:#555;font-size:12px;padding:16px;grid-column:1/-1;text-align:center;">No movies match.</div>'}</div>
    <div style="text-align:center;margin-top:8px;"><button class="btn sec sm" onclick="spRandom()">Pick random</button></div>`;
}

window.spCat=function(c){sp.filterCat=c;renderSP();};
window.spDiff=function(d){sp.filterDiff=d;renderSP();};
window.spPick=function(i){if(_spList[i])spStart(_spList[i]);};
window.spRandom=function(){
  if(!_spList.length)return;
  spStart(_spList[Math.floor(Math.random()*_spList.length)]);
};

function spStart(movie){
  sp.movie=movie;
  sp.display=movie.t.split('').map(c=>(VOWELS.has(c)||c===' ')?c:'_');
  sp.guessed=new Set();sp.chances=9;sp.won=false;sp.phase='playing';
  renderSP();
}

function buildSPPlaying(){
  const a=document.getElementById('area');
  const m=sp.movie;
  const diffCol={easy:'#7fc43a',medium:'#f5c842',hard:'#e05555'};
  const chars = buildChars(m.t, sp.display);
  const dots=Array.from({length:9},(_,i)=>`<div class="ld${i>=sp.chances?' x':''}"></div>`).join('');
  const pills=[...sp.guessed].sort().map(l=>`<div class="pill ${m.t.includes(l)?'ok':'no'}">${l.toUpperCase()}</div>`).join('');
  const kb=KBROWS.map(row=>`<div class="kbr">${row.split('').map(k=>{
    const u=sp.guessed.has(k),h=m.t.includes(k);
    return`<button class="k${u?(h?' hit':' miss'):''}" ${u?'disabled':''} data-key="${k}">${k.toUpperCase()}</button>`;
  }).join('')}</div>`).join('');
  const numrow=DIGITS.map(d=>{
    const u=sp.guessed.has(d),h=m.t.includes(d);
    return`<button class="k num${u?(h?' hit':' miss'):''}" ${u?'disabled':''} data-key="${d}">${d}</button>`;
  }).join('');

  a.innerHTML=`
    <div class="streak-bar">
      <div><div class="streak-label">Streak</div><div class="streak-val">${sp.streak}</div></div>
      <div style="flex:1;display:flex;justify-content:center;gap:6px;align-items:center;">
        <span class="catbadge">${m.cat}</span>
        <span style="font-size:9px;color:${diffCol[m.d]};border:0.5px solid ${diffCol[m.d]};padding:2px 7px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;">${m.d}</span>
      </div>
      <div style="text-align:right"><div class="streak-label">Best</div><div class="best-val">${sp.bestStreak}</div></div>
    </div>
    <div class="movie-disp">${chars}</div>
    <div class="hrow">
      <div><div style="font-size:10px;color:#444;margin-bottom:3px;">Lives</div><div class="ldots">${dots}</div></div>
      <div style="font-size:11px;color:#444;">${m.y}</div>
      <div style="text-align:right"><div style="font-size:10px;color:#444;">Left</div><div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#f5c842;">${sp.chances}</div></div>
    </div>
    ${pills?`<div class="pills">${pills}</div>`:'<div style="min-height:26px"></div>'}
    <div class="kb">${kb}<div style="margin-top:5px;"><div class="nlabel">Numbers</div><div class="kbr">${numrow}</div></div></div>
    <div style="text-align:center;margin-top:4px;"><button class="btn sec sm" onclick="spGiveUp()">Give up</button></div>
  `;
  document.querySelectorAll('.k:not(:disabled)').forEach(b=>b.addEventListener('click',()=>spGuess(b.dataset.key)));
  document.addEventListener('keydown',onKeySP);
}

function spGuess(ch){
  if(sp.phase!=='playing'||sp.guessed.has(ch))return;
  sp.guessed.add(ch);
  let hit=false;
  sp.movie.t.split('').forEach((c,i)=>{if(c===ch){sp.display[i]=ch;hit=true;}});
  if(!hit)sp.chances--;
  const won=sp.display.join('')===sp.movie.t;
  const lost=sp.chances<=0;
  if(won){sp.won=true;sp.streak++;if(sp.streak>sp.bestStreak){sp.bestStreak=sp.streak;localStorage.setItem('bwhg_best',sp.bestStreak);}sp.phase='over';document.removeEventListener('keydown',onKeySP);renderSP();}
  else if(lost){sp.streak=0;sp.phase='over';document.removeEventListener('keydown',onKeySP);renderSP();}
  else buildSPPlaying();
}
function onKeySP(e){if(sp.phase!=='playing')return;const k=e.key.toLowerCase();if(/^[a-z0-9]$/.test(k))spGuess(k);}
window.spGiveUp=function(){sp.streak=0;sp.won=false;sp.phase='over';document.removeEventListener('keydown',onKeySP);renderSP();};

function buildSPOver(){
  const won=sp.won,m=sp.movie;
  const diffCol={easy:'#7fc43a',medium:'#f5c842',hard:'#e05555'};
  return`<div class="ovl">
    <h2 class="${won?'win':'lose'}">${won?'YOU WON GENIUS!':'Cut!'}</h2>
    <div class="mn">${titleCase(m.t)}</div>
    <div style="display:flex;gap:6px;justify-content:center;margin-bottom:12px;">
      <span class="catbadge">${m.cat}</span>
      <span style="font-size:10px;color:${diffCol[m.d]};letter-spacing:1px;">${m.y} · ${m.d}</span>
    </div>
    <div class="sub2">${won?'Streak: '+sp.streak+' &nbsp;·&nbsp; Best: '+sp.bestStreak:'Streak reset to 0. Best: '+sp.bestStreak}</div>
    <button class="btn" onclick="spNext()">Next Movie</button>
    <button class="btn sec" onclick="spGoSetup()">Change Filter</button>
  </div>`;
}
window.spNext=function(){
  const all=[];
  const cats=sp.filterCat==='all'?['bollywood','hollywood']:[sp.filterCat];
  cats.forEach(c=>MOVIES[c].forEach(m=>all.push({...m,cat:c})));
  let list=sp.filterDiff==='all'?all:all.filter(m=>m.d===sp.filterDiff);
  list=list.filter(m=>m.t!==sp.movie.t);
  if(!list.length){sp.phase='setup';renderSP();return;}
  spStart(list[Math.floor(Math.random()*list.length)]);
};
window.spGoSetup=function(){sp.phase='setup';renderSP();};

// ════════════════════════════════════════════════════════════════
// MULTIPLAYER
// ════════════════════════════════════════════════════════════════
function renderMP(){
  document.removeEventListener('keydown',onKeyMP);
  clearInterval(local.pollTimer);
  const a=document.getElementById('area');
  if(!local.role){a.innerHTML=buildHome();return;}
  if(room&&room.phase==='setup'&&local.role==='host'){a.innerHTML=buildHostSetup();return;}
  if(room&&room.phase==='setup'&&local.role==='guest'){a.innerHTML=buildGuestWait();startPoll();return;}
  if(room&&room.phase==='playing'){buildPlaying();return;}
  if(room&&room.phase==='roundover'){buildRoundOver();return;}
  if(room&&room.phase==='gameover'){buildGameOver();return;}
  a.innerHTML=buildHome();
}

function buildHome(){
  const fbOk=_useFirebase;
  const statusBadge=fbOk
    ?`<div style="text-align:center;margin-bottom:12px;"><span style="font-size:10px;color:#7fc43a;border:0.5px solid #3b6d11;padding:2px 10px;border-radius:4px;letter-spacing:1px;">● Firebase connected — cross-device play enabled</span></div>`
    :`<div style="text-align:center;margin-bottom:12px;"><span style="font-size:10px;color:#e05555;border:0.5px solid #a32d2d;padding:2px 10px;border-radius:4px;letter-spacing:1px;">⚠ Firebase not configured — same-device only</span></div>
     <div style="font-size:11px;color:#555;text-align:center;margin-bottom:12px;line-height:1.6;">To play across devices, add your <code style="color:#888;background:#1a1a1a;padding:1px 4px;border-radius:3px;">FIREBASE_DB_URL</code> in the HTML file. <a href="https://console.firebase.google.com" target="_blank" style="color:#f5c842;">Set up Firebase →</a></div>`;
  return`${statusBadge}<div class="card">
    <div class="label">Your name</div>
    <input class="fi" id="pname" placeholder="Enter your name" maxlength="16"/>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:4px;">
      <button class="btn" onclick="goCreate()">Create Room</button>
      <button class="btn sec" onclick="goJoin()">Join Room</button>
    </div>
  </div><div id="join-area"></div>`;
}

window.goCreate=async function(){
  const n=document.getElementById('pname').value.trim();
  if(!n){document.getElementById('pname').classList.add('err');return;}
  if(!_useFirebase){alert('Firebase is not configured. Cross-device multiplayer requires Firebase.\n\nAdd your FIREBASE_DB_URL to the HTML file to enable it.');return;}
  local.name=n;local.role='host';local.code=genCode();
  room={code:local.code,phase:'setup',host:n,guest:null,scores:{[n]:0},category:null,movie:'',display:[],guessed:[],chances:9,setter:n,guesser:null,round:1,roundResult:null};
  await saveRoom(local.code,room);renderMP();startPoll();
};

window.goJoin=function(){
  document.getElementById('join-area').innerHTML=`
    <div class="card" style="margin-top:10px;">
      <div class="label">Room code</div>
      <input class="fi" id="rcode" placeholder="e.g. AB3XY" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;"/>
      <div style="text-align:center"><button class="btn" onclick="doJoin()">Join</button></div>
      <div class="msg" id="jmsg"></div>
    </div>`;
};

window.doJoin=async function(){
  const n=document.getElementById('pname').value.trim();
  const c=(document.getElementById('rcode').value||'').trim().toUpperCase();
  if(!n){document.getElementById('pname').classList.add('err');return;}
  if(!c){document.getElementById('rcode').classList.add('err');return;}
  const msg=document.getElementById('jmsg');
  msg.className='msg';msg.textContent='Joining...';
  if(!_useFirebase){msg.className='msg err';msg.textContent='Firebase not configured — multiplayer requires Firebase. See setup instructions.';return;}
  let r;
  try { r=await loadRoom(c); } catch(e) { msg.className='msg err';msg.textContent='Connection error. Check Firebase config.';return; }
  if(!r){msg.className='msg err';msg.textContent='Room not found. Check the code and try again.';return;}
  if(r.guest&&r.guest!==n){msg.className='msg err';msg.textContent='Room is full.';return;}
  local.name=n;local.role='guest';local.code=c;
  r.guest=n;r.scores[n]=0;r.guesser=n;room=r;
  await saveRoom(c,room);renderMP();
};

function buildHostSetup(){
  const catErr=window._catErr||false,waiting=!room.guest;
  return`<div class="tag">Host · Round ${room.round} of ${MAX_ROUNDS}</div>
  <div class="room-code" onclick="copyCode()">${local.code}</div>
  <div class="copy-tip">tap to copy &amp; share with friend</div>
  <div class="info" style="margin-top:8px;">${waiting?'<span class="pulse">Waiting for player 2...</span>':'<span style="color:#7fc43a">✓ '+room.guest+' has joined!</span>'}</div>
  ${!waiting?`<div class="card">
    <div class="label">Select category <span style="color:#a32d2d">*</span></div>
    <div class="cat-row">
      <div class="cat${room.category==='bollywood'?' active':''}${catErr&&!room.category?' shake':''}" onclick="setCat('bollywood')">Bollywood</div>
      <div class="cat${room.category==='hollywood'?' active':''}${catErr&&!room.category?' shake':''}" onclick="setCat('hollywood')">Hollywood</div>
    </div>
    <div class="label">Movie title (hidden)</div>
    <input class="fi" id="minp" type="password" placeholder="Enter movie..." autocomplete="off"/>
    <div style="text-align:center"><button class="btn" onclick="startRound()">Start Round ${room.round}</button></div>
    <div class="msg err" id="hmsg"></div>
  </div>`:''}`;
}

window.copyCode=function(){navigator.clipboard.writeText(local.code).catch(()=>{});};
window.setCat=async function(c){window._catErr=false;room.category=c;await saveRoom(local.code,room);renderMP();};

window.startRound=async function(){
  const mv=(document.getElementById('minp').value||'').trim().toLowerCase();
  if(!room.category){window._catErr=true;renderMP();setTimeout(()=>{window._catErr=false;},800);return;}
  if(!mv){document.getElementById('hmsg').textContent='Please enter a movie name.';return;}
  room.movie=mv;room.display=mv.split('').map(c=>(VOWELS.has(c)||c===' ')?c:'_');
  room.guessed=[];room.chances=9;room.phase='playing';
  await saveRoom(local.code,room);renderMP();
};

function buildGuestWait(){
  return`<div class="tag">Guest · Round ${room?room.round:1} of ${MAX_ROUNDS}</div>
  <div class="card" style="text-align:center;">
    <div class="room-code">${local.code}</div>
    <div class="info pulse" style="margin-top:12px;">Waiting for ${room?room.host:'host'} to set the movie...</div>
  </div>`;
}

function buildPlaying(){
  const a=document.getElementById('area');
  const isG=local.name===room.guesser;
  const chars = buildChars(room.movie, room.display);
  const dots=Array.from({length:9},(_,i)=>`<div class="ld${i>=room.chances?' x':''}"></div>`).join('');
  const pills=[...room.guessed].sort().map(l=>`<div class="pill ${room.movie.includes(l)?'ok':'no'}">${l.toUpperCase()}</div>`).join('');
  const guessed=new Set(room.guessed);
  const kb=KBROWS.map(row=>`<div class="kbr">${row.split('').map(k=>{
    const u=guessed.has(k),h=room.movie.includes(k);
    return`<button class="k${u?(h?' hit':' miss'):''}" ${(!isG||u)?'disabled':''} data-key="${k}">${k.toUpperCase()}</button>`;
  }).join('')}</div>`).join('');
  const numrow=DIGITS.map(d=>{
    const u=guessed.has(d),h=room.movie.includes(d);
    return`<button class="k num${u?(h?' hit':' miss'):''}" ${(!isG||u)?'disabled':''} data-key="${d}">${d}</button>`;
  }).join('');
  const scoreHTML=Object.entries(room.scores).map(([n,s])=>`
    <div class="scrd${n===room.guesser?' guesser':''}"><div class="sn">${n}</div><div class="sv">${s}</div><div class="role-tag">${n===room.guesser?'guessing':'setting'}</div></div>`).join('');

  a.innerHTML=`
    <div class="scoreboard">${scoreHTML}</div>
    <div class="turn-banner">Round ${room.round}/${MAX_ROUNDS} · ${room.category} · ${isG?'Your turn!':room.guesser+' is guessing...'}</div>
    <div class="movie-disp">${chars}</div>
    <div class="hrow">
      <div><div style="font-size:10px;color:#444;margin-bottom:3px;">Lives</div><div class="ldots">${dots}</div></div>
      <div class="catbadge">${room.category}</div>
      <div style="text-align:right"><div style="font-size:10px;color:#444;">Left</div><div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#f5c842;">${room.chances}</div></div>
    </div>
    ${pills?`<div class="pills">${pills}</div>`:'<div style="min-height:26px"></div>'}
    <div class="kb">${kb}<div style="margin-top:5px;"><div class="nlabel">Numbers</div><div class="kbr">${numrow}</div></div></div>
    ${!isG?`<div class="msg" style="color:#444;">You set the movie — watch ${room.guesser} guess!</div>`:''}
  `;
  if(isG){
    document.querySelectorAll('.k:not(:disabled)').forEach(b=>b.addEventListener('click',()=>mpGuess(b.dataset.key)));
    document.addEventListener('keydown',onKeyMP);
  }
  startPoll();
}

async function mpGuess(ch){
  if(!room||room.phase!=='playing'||room.guessed.includes(ch))return;
  room.guessed.push(ch);
  let hit=false;
  room.movie.split('').forEach((c,i)=>{if(c===ch){room.display[i]=ch;hit=true;}});
  if(!hit)room.chances--;
  const won=room.display.join('')===room.movie,lost=room.chances<=0;
  if(won)room.scores[room.guesser]=(room.scores[room.guesser]||0)+1;
  room.roundResult=won?'win':'lose';
  if(won||lost)room.phase=room.round>=MAX_ROUNDS?'gameover':'roundover';
  await saveRoom(local.code,room);
  if(room.phase==='playing')buildPlaying();
  else if(room.phase==='roundover')buildRoundOver();
  else buildGameOver();
}
function onKeyMP(e){if(!room||room.phase!=='playing')return;const k=e.key.toLowerCase();if(/^[a-z0-9]$/.test(k))mpGuess(k);}

function buildRoundOver(){
  clearInterval(local.pollTimer);document.removeEventListener('keydown',onKeyMP);
  const a=document.getElementById('area');
  const won=room.roundResult==='win',nextSetter=room.guesser,nextGuesser=room.setter,iAm=local.name===nextSetter;
  const scoreHTML=Object.entries(room.scores).map(([n,s])=>`<div class="scrd"><div class="sn">${n}</div><div class="sv">${s}</div></div>`).join('');
  a.innerHTML=`<div class="ovl">
    <h2 class="${won?'win':'lose'}">${won?'Correct!':'Out of lives!'}</h2>
    <div class="mn">${room.movie.toUpperCase()}</div>
    <div class="sub2">${won?room.guesser+' guessed it! +1 point':'Nobody scored.'}</div>
    <div class="scoreboard" style="margin-bottom:16px;">${scoreHTML}</div>
    ${iAm?`<div class="card">
      <div class="label">Round ${room.round+1} of ${MAX_ROUNDS} — your turn to set</div>
      <div class="label" style="margin-top:8px;">Select category <span style="color:#a32d2d">*</span></div>
      <div class="cat-row">
        <div class="cat${room.category==='bollywood'?' active':''}" onclick="setNextCat('bollywood')">Bollywood</div>
        <div class="cat${room.category==='hollywood'?' active':''}" onclick="setNextCat('hollywood')">Hollywood</div>
      </div>
      <div class="label">Movie title (hidden)</div>
      <input class="fi" id="nminp" type="password" placeholder="Enter movie..." autocomplete="off"/>
      <div style="text-align:center"><button class="btn" onclick="nextRound('${nextSetter}','${nextGuesser}')">Start Round ${room.round+1}</button></div>
      <div class="msg err" id="nmsg"></div>
    </div>`:`<div class="info pulse">Waiting for ${nextSetter} to set the next movie...</div>`}
  </div>`;
  if(!iAm)startPoll();
}
window.setNextCat=function(c){room.category=c;buildRoundOver();};
window.nextRound=async function(setter,guesser){
  const mv=(document.getElementById('nminp').value||'').trim().toLowerCase();
  const msg=document.getElementById('nmsg');
  if(!room.category){msg.textContent='Select a category first!';document.querySelectorAll('.cat').forEach(el=>{el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),400);});return;}
  if(!mv){msg.textContent='Enter a movie name.';return;}
  room.round++;room.setter=setter;room.guesser=guesser;
  room.movie=mv;room.display=mv.split('').map(c=>(VOWELS.has(c)||c===' ')?c:'_');
  room.guessed=[];room.chances=9;room.phase='playing';room.roundResult=null;
  await saveRoom(local.code,room);renderMP();
};

function buildGameOver(){
  clearInterval(local.pollTimer);document.removeEventListener('keydown',onKeyMP);
  const a=document.getElementById('area');
  const entries=Object.entries(room.scores).sort((a,b)=>b[1]-a[1]);
  const tied=entries[0][1]===entries[1][1];
  const won=room.roundResult==='win';
  const scoreHTML=entries.map(([n,s])=>`<div class="scrd"><div class="sn">${n}</div><div class="sv">${s}</div></div>`).join('');
  a.innerHTML=`<div class="ovl">
    <h2 class="${won?'win':'lose'}">${won?'Correct!':'Out of lives!'}</h2>
    <div class="mn">${room.movie.toUpperCase()}</div>
    <div class="sub2">${won?room.guesser+' guessed it! +1 point':'Nobody scored.'}</div>
    <div class="scoreboard" style="margin-bottom:12px;">${scoreHTML}</div>
    <div class="winner-text">${tied?"It's a tie!":'🎬 '+entries[0][0]+' wins!'}</div>
    ${local.role==='host'?`<button class="btn" onclick="restartGame()">Play Again</button>`:'<div class="info">Ask the host to restart.</div>'}
  </div>`;
}
window.restartGame=async function(){
  room.round=1;room.phase='setup';room.category=null;room.movie='';room.display=[];room.guessed=[];room.chances=9;room.roundResult=null;
  Object.keys(room.scores).forEach(k=>room.scores[k]=0);
  room.setter=room.host;room.guesser=room.guest;
  await saveRoom(local.code,room);renderMP();
};

function startPoll(){
  clearInterval(local.pollTimer);
  local.pollTimer=setInterval(async()=>{
    const r=await loadRoom(local.code);if(!r)return;
    if(JSON.stringify(r)!==JSON.stringify(room)){room=r;clearInterval(local.pollTimer);renderMP();}
  },POLL_MS);
}

// ── Init ──────────────────────────────────────────────────────────
(function(){
  const f=document.getElementById('film');
  for(let i=0;i<12;i++){const d=document.createElement('div');d.className='spr';f.appendChild(d);}
  renderSP();
})();
</script>
</body>
</html>
